<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser Organizer</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <h1>Browser Organizer</h1>
      <div id="health" role="status"></div>
      <button id="run" class="primary">Analyze my tabs & bookmarks</button>
      <button id="cancelRun" hidden>Cancel</button>
      <p id="status" role="status"></p>
    </header>

    <section id="summary" hidden></section>

    <section id="plan" aria-label="Suggestions"></section>

    <div id="undoToast" role="status" hidden></div>

    <footer>
      <button id="approveSelected">Apply selected</button>
      <button id="approveAll">Apply all</button>
      <button id="showUndo">Undo history</button>
    </footer>

    <details id="settings">
      <summary>Settings</summary>
      <form id="settingsForm">
        <label><input type="checkbox" name="groupTabs" /> Group open tabs by topic</label>
        <label><input type="checkbox" name="staleTabs" /> Suggest closing forgotten tabs</label>
        <label><input type="checkbox" name="importantBookmarks" /> Auto-bookmark important tabs</label>
        <label><input type="checkbox" name="cleanBookmarks" /> Clean up stale/dead bookmarks</label>
        <label><input type="checkbox" name="deadLinkScan" /> Check bookmarked pages for dead links (requests access to all sites)</label>
        <label>Close tabs idle more than
          <input type="number" name="staleTabDays" min="1" max="365" /> days</label>
        <label>Bookmarks unvisited more than
          <input type="number" name="staleBookmarkDays" min="1" max="3650" /> days</label>
        <label><input type="checkbox" name="autoMode" /> Auto-apply on a schedule (with undo)</label>
        <button type="submit">Save settings</button>
      </form>
    </details>

    <dialog id="undoDialog">
      <h2>Undo history</h2>
      <ul id="undoList"></ul>
      <button id="closeUndo">Close</button>
    </dialog>

    <template id="itemTemplate">
      <li class="item">
        <label>
          <input type="checkbox" class="itemCheck" />
          <span class="itemAction"></span>
          <span class="itemReason"></span>
          <span class="itemUrl"></span>
        </label>
      </li>
    </template>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
