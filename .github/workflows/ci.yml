name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only checks out and runs node, so read-only
# access to the repo contents is all they need.
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Chrome-for-Testing (bundled chromium) + xvfb deps. The fixtures register
      # the native host themselves. BORG_SKIP_CLI=1 skips the specs that need a
      # real signed-in AI CLI (unavailable on CI); the local specs still run.
      - run: npx playwright install --with-deps chromium
      - run: BORG_SKIP_CLI=1 npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
